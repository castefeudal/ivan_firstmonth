                    <div className="max-w-md mx-auto px-5 py-5 flex justify-between items-center">
                    <div>
                        <div className="text-[10px] font-bold text-gold-500 uppercase tracking-[0.3em] mb-1">MARKOVMADE</div>
                        <h1 className="text-white font-bold text-[19px] tracking-tight">ИВАН <span className="text-zinc-600 font-medium px-1.5">|</span> <span className="text-zinc-300">МЕСЯЦ 2</span></h1>
                    </div>
                    <button 
                        onClick={() => setShowIntro(true)} 
                        className="w-11 h-11 flex items-center justify-center rounded-full bg-onyx-900 border border-white/5 text-zinc-400 hover:text-gold-500 hover:bg-zinc-800 transition-colors shadow-sm"
                    >
                        <Info size={22} />
                    </button>
                    </div>
                </header>

                {/* Контент */}
                <main className="max-w-md mx-auto px-4 pt-8 relative z-10">
                    {activeTab === 'home' && <HomeView checks={checks} toggleCheck={toggleCheck} />}
                    {activeTab === 'nutrition' && <NutritionView />}
                    {activeTab === 'workout' && <WorkoutView />}
                    {activeTab === 'insights' && <InsightsView />}
                </main>

                {/* Навигация */}
                <nav className="fixed bottom-0 left-0 right-0 z-40 bg-onyx-950/95 backdrop-blur-2xl border-t border-white/5 pb-safe shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
                    <div className="max-w-md mx-auto flex">
                    <TabButton active={activeTab === 'home'} onClick={() => setActiveTab('home')} icon={Clock} label="План" />
                    <TabButton active={activeTab === 'nutrition'} onClick={() => setActiveTab('nutrition')} icon={Utensils} label="Питание" />
                    <TabButton active={activeTab === 'workout'} onClick={() => setActiveTab('workout')} icon={Dumbbell} label="Зал" />
                    <TabButton active={activeTab === 'insights'} onClick={() => setActiveTab('insights')} icon={Brain} label="Опора" />
                    </div>
                </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
