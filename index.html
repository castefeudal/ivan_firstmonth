<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MARKOVMADE | Иван, жду на связи</title>
    
    <!-- Подключение стилей Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        onyx: {
                            800: '#1A1A1A',
                            900: '#111111', 
                            950: '#050505',
                        },
                        gold: {
                            400: '#E6C687',
                            500: '#D4AF37',
                            600: '#AA8C2C',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Шрифт Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- React и ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Библиотека иконок Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            color: #f4f4f5; 
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            letter-spacing: 0.015em;
            margin: 0;
            overflow-x: hidden;
        }
        
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .animate-in { 
            animation: fadeInScale 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }

        /* Фоновый градиент для премиальности */
        .ambient-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.08) 0%, transparent 60%);
            z-index: -1;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Настройка иконок ---
        const createIcon = (iconName) => ({ color = "currentColor", size = 24, className = "", ...props }) => {
            const iconDef = lucide.icons[iconName];
            if (!iconDef) return null;
            return React.createElement('svg', {
                xmlns: "http://www.w3.org/2000/svg",
                width: size,
                height: size,
                viewBox: "0 0 24 24",
                fill: "none",
                stroke: color || "currentColor",
                strokeWidth: 2,
                strokeLinecap: "round",
                strokeLinejoin: "round",
                className: `lucide lucide-${iconName.toLowerCase()} ${className}`,
                ...props
            }, ...iconDef.map(([tag, attrs]) => React.createElement(tag, attrs)));
        };

        const MessageCircle = createIcon('MessageCircle');
        const ShieldAlert = createIcon('ShieldAlert');
        const TrendingDown = createIcon('TrendingDown');
        const Activity = createIcon('Activity');
        const Award = createIcon('Award');

        const App = () => {
            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-5 relative">
                    <div className="ambient-bg"></div>
                    
                    {/* Логотип наверху */}
                    <div className="absolute top-8 left-0 right-0 flex justify-center opacity-50">
                        <div className="text-[10px] font-bold text-gold-500 uppercase tracking-[0.4em]">Markovmade</div>
                    </div>

                    <div className="w-full max-w-lg animate-in">
                        
                        {/* Карточка с главным достижением */}
                        <div className="flex justify-center mb-8 animate-float">
                            <div className="bg-gradient-to-b from-onyx-800 to-onyx-900 border border-gold-500/30 p-4 rounded-3xl shadow-[0_10px_40px_rgba(212,175,55,0.15)] flex flex-col items-center justify-center min-w-[140px]">
                                <Award className="text-gold-500 mb-2" size={28} />
                                <div className="text-3xl font-black text-white tracking-tighter">-7<span className="text-xl text-zinc-400">КГ</span></div>
                                <div className="text-[9px] text-gold-500 font-bold uppercase tracking-widest mt-1">Твой результат</div>
                            </div>
                        </div>

                        {/* Основное письмо */}
                        <div className="bg-onyx-900/80 backdrop-blur-xl rounded-[2rem] border border-white/5 shadow-2xl overflow-hidden relative">
                            {/* Блик сверху */}
                            <div className="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-transparent via-gold-500/50 to-transparent"></div>
                            
                            <div className="p-8 sm:p-10">
                                <h1 className="text-2xl sm:text-[28px] font-black text-white mb-6 tracking-tight leading-tight">
                                    Иван, пауза — это нормально.<br/>
                                    <span className="text-gold-500">Главное — не останавливаться.</span>
                                </h1>
                                
                                <div className="space-y-5 text-zinc-300 text-[15px] sm:text-base leading-relaxed">
                                    <p>
                                        Вижу, что ты пропал с радаров и оставил сообщения без ответа. Я прекрасно понимаю: бывают моменты, когда жизнь подкидывает штормы, накрывает с головой, и хочется просто поставить всё на паузу.
                                    </p>
                                    
                                    <div className="p-5 bg-onyx-950/50 rounded-2xl border-l-2 border-gold-500 my-6">
                                        <p className="text-zinc-100 font-medium">
                                            Но давай вспомним главное: <span className="text-gold-500 font-bold">мы уже сделали крутой рывок и убрали 7 кг</span>. Это мощный фундамент, который ты заложил собственным трудом и дисциплиной. И этот результат никто у тебя не отнимет.
                                        </p>
                                    </div>

                                    <p>
                                        Как твой наставник, я здесь не для того, чтобы требовать сухие отчеты или осуждать за тишину. Моя задача — помочь тебе пройти через этот период и сохранить то, чего мы уже добились.
                                    </p>
                                    
                                    <p className="text-zinc-400 italic text-[14px]">
                                        * Доступ к текущей программе временно приостановлен, чтобы мы могли синхронизироваться и при необходимости скорректировать курс под твою текущую загрузку и состояние.
                                    </p>
                                </div>
                            </div>

                            {/* Акцентный блок с кнопкой */}
                            <div className="bg-onyx-950/80 p-8 sm:p-10 border-t border-white/5 text-center relative overflow-hidden">
                                {/* Пульсирующее свечение за кнопкой */}
                                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-40 h-40 bg-gold-500/20 rounded-full blur-[50px] animate-pulse-slow"></div>
                                
                                <h3 className="text-white font-bold text-lg mb-6 relative z-10">Жду от тебя весточки. Просто напиши, как ты.</h3>
                                
                                <a 
                                    href="https://t.me/markovmade" 
                                    target="_blank" 
                                    className="relative z-10 group flex items-center justify-center gap-3 w-full bg-gradient-to-r from-gold-600 to-gold-500 text-onyx-950 py-5 rounded-2xl font-black text-[15px] uppercase tracking-widest transition-all duration-300 hover:shadow-[0_0_40px_rgba(212,175,55,0.4)] hover:scale-[1.02] active:scale-[0.98]"
                                >
                                    <MessageCircle size={24} strokeWidth={2.5} className="group-hover:animate-bounce" />
                                    <span>Написать Павлу в Telegram</span>
                                </a>
                                
                                <div className="mt-6 text-[12px] text-zinc-500 font-medium">
                                    Твой товарищ и наставник, Павел Марков
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
